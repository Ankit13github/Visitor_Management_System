<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulk WhatsApp Sender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            padding: 30px;
            width: 100%;
            max-width: 650px;
        }
        h2 {
            text-align: center;
            color: #6a11cb;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>📤 Bulk WhatsApp Sender</h2>
        <form action="/bulk_message" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Upload Excel File (.xlsx)</label>
                <input type="file" name="file" class="form-control" accept=".xlsx">
            </div>
            <div class="mb-3">
                <label class="form-label">Or Enter WhatsApp Numbers</label>
                <textarea name="manual_numbers" rows="3" class="form-control" placeholder="Comma or line-separated"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" rows="12" class="form-control" required>
Hello Student, 

Welcome to Vikrant Group Of Institutions, Indore.

Thank you very much for visiting the campus.

VGI is running UG & PG courses in Engineering, Management, Nursing, Pharmacy & Law.

Courses approved by UGC, AICTE, PCI, BCI, MPNRC and affiliated to state Govt. Universities.

Scholarship Schemes: https://www.vitm.edu.in/scholarship.html
Instagram: https://www.instagram.com/vikrant.indore

We hope your visit was inspiring.

Thanks!
                </textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Bulk Messages</button>
        </form>
    </div>

    <script>
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get("success") === "1") {
                Toastify({
                    text: "✅ Bulk Messages Sent Successfully!",
                    duration: 3000,
                    gravity: "top",
                    position: "right",
                    backgroundColor: "#198754",
                    close: true
                }).showToast();
            }
        };
    </script>
</body>
</html>
