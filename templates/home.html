<!DOCTYPE html>
<html>
<head>
    <title>Visitor Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-custom {
            width: 100%;
            margin-bottom: 15px;
            font-size: 18px;
        }

        h1 {
            font-weight: bold;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

<div class="card text-center" style="width: 350px;">
    <h1>Visitor System</h1>

    <a href="{{ url_for('visitor_form') }}" class="btn btn-primary btn-custom">➕ Add Visitor</a>

    <a href="{{ url_for('bulk_message') }}" class="btn btn-success btn-custom">📩 Bulk Message</a>

    <a href="{{ url_for('dashboard') }}" class="btn btn-warning btn-custom">📊 Dashboard</a>

    <a href="{{ url_for('view_visitors') }}" class="btn btn-dark btn-custom">👥 View Visitors</a>
</div>

</body>
</html>
