<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Visitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 768px) {
            h1, h2, h3 {
                font-size: 22px;
            }

            .btn {
                font-size: 16px;
                padding: 10px;
            }

            input, select {
                font-size: 16px;
            }
        }
    </style>
</head>

<body style="background:#f4f6fb;">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3 class="text-center mb-4">✏ Edit Visitor</h3>

        <form method="POST">

            <div class="mb-3">
                <label>Student Name</label>
                <input type="text" name="student_name" class="form-control" value="{{ visitor[1] }}" required>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="text" name="student_number" class="form-control" value="{{ visitor[2] }}" required>
            </div>

           <div class="mb-3">
                <label class="form-label">Course Name</label>
                <select name="course_name" class="form-select" required>

                    <option value="Engineering" {% if visitor[3] == "Engineering" %}selected{% endif %}>Engineering</option>
                    <option value="Management" {% if visitor[3] == "Management" %}selected{% endif %}>Management</option>
                    <option value="Nursing" {% if visitor[3] == "Nursing" %}selected{% endif %}>Nursing</option>
                    <option value="Pharmacy" {% if visitor[3] == "Pharmacy" %}selected{% endif %}>Pharmacy</option>
                    <option value="Law" {% if visitor[3] == "Law" %}selected{% endif %}>Law</option>

                </select>
            </div>

            <div class="mb-3">
                <label>Parent Name</label>
                <input type="text" name="parent_name" class="form-control" value="{{ visitor[4] }}" required>
            </div>

            <div class="mb-3">
                <label>Parent Contact</label>
                <input type="text" name="parent_contact" class="form-control" value="{{ visitor[5] }}" required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success">Update</button>
                <a href="{{ url_for('view_visitors') }}" class="btn btn-secondary">Cancel</a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
