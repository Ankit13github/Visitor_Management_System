<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f8f9ff);
        }

        .card-custom {
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card-custom:hover {
            transform: translateY(-5px);
        }

        .title {
            font-weight: 600;
        }

        .count {
            font-size: 48px;
            font-weight: bold;
            color: #6a11cb;
        }

        .nav-btn {
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 16px;
        }

         @media (max-width: 768px) {
            h1, h2, h3 {
                font-size: 22px;
            }

            .btn {
                font-size: 16px;
                padding: 10px;
            }

            input, select {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="text-center mb-5">
        <h2 class="title">📊 Visitor Dashboard</h2>
        <p class="text-muted">Overview of your visitor system</p>
    </div>

    <!-- Stats Card -->
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-custom text-center">
                <i class="bi bi-people-fill fs-1 text-primary mb-3"></i>
                <h5>Total Visitors</h5>
                <div class="count">{{ total }}</div>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="row text-center mt-5">
        <div class="col-md-3 mb-3">
            <a href="{{ url_for('visitor_form') }}" class="btn btn-primary w-100 nav-btn">
                ➕ Add Visitor
            </a>
        </div>

        <div class="col-md-3 mb-3">
            <a href="{{ url_for('bulk_message') }}" class="btn btn-success w-100 nav-btn">
                📩 Bulk Message
            </a>
        </div>

        <div class="col-md-3 mb-3">
            <a href="{{ url_for('view_visitors') }}" class="btn btn-dark w-100 nav-btn">
                👥 View Visitors
            </a>
        </div>

        <div class="col-md-3 mb-3">
            <a href="{{ url_for('home') }}" class="btn btn-secondary w-100 nav-btn">
                ⬅ Back Home
            </a>
        </div>
    </div>

</div>

</body>
</html>
