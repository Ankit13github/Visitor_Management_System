<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visitors</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f8f9ff);
        }

        .card {
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .table thead {
            background-color: #6a11cb;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f3ff;
            transition: 0.2s;
        }

        .title {
            font-weight: 600;
        }

        .action-btns a {
            margin: 2px;
        }

        @media (max-width: 768px) {
            h1, h2, h3 {
                font-size: 22px;
            }

            .btn {
                font-size: 16px;
                padding: 10px;
            }

            input, select {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="title">👥 Visitor Records</h2>
        
        <div>
            <a href="{{ url_for('download') }}" class="btn btn-success">
                ⬇ Download Excel
            </a>

            <a href="{{ url_for('home') }}" class="btn btn-secondary">
                ⬅ Back
            </a>
        </div>
    </div>

    <!-- Filters -->
    <div class="row g-2 mb-3">

        <!-- Search by Name -->
        <div class="col-12 col-md-4">
            <input type="text" id="nameSearch" class="form-control" placeholder="🔍 Search by Name">
        </div>

        <!-- Filter by Course (Dropdown) -->
        <div class="col-12 col-md-4">
            <select id="courseSearch" class="form-select">
                <option value="">🎓 All Courses</option>
                <option value="Engineering">Engineering</option>
                <option value="Management">Management</option>
                <option value="Nursing">Nursing</option>
                <option value="Pharmacy">Pharmacy</option>
                <option value="Law">Law</option>
            </select>
        </div>

        <!-- Reset -->
        <div class="col-12 col-md-4">
            <button class="btn btn-secondary w-100" onclick="resetFilters()">Reset</button>
        </div>

    </div>

    <!-- Table -->
    <div class="card">

        <div class="table-responsive">
            <table class="table table-hover align-middle text-center" id="visitorTable">

                <thead>
                    <tr>
                        {% for h in headers %}
                        <th>{{ h }}</th>
                        {% endfor %}
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for row in rows %}
                    <tr>
                        {% for cell in row %}
                        <td>{{ cell }}</td>
                        {% endfor %}

                        <td class="action-btns">
                            
                            <!-- Edit -->
                            <a href="{{ url_for('edit_visitor', id=row[0]) }}" 
                               class="btn btn-warning btn-sm">
                               <i class="bi bi-pencil-square"></i>
                            </a>

                            <!-- Delete -->
                            <a href="{{ url_for('delete_visitor', id=row[0]) }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure you want to delete this record?')">
                               <i class="bi bi-trash"></i>
                            </a>

                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>

</div>

<!-- Filter Script -->
<script>
const nameInput = document.getElementById("nameSearch");
const courseInput = document.getElementById("courseSearch");

nameInput.addEventListener("keyup", filterTable);
courseInput.addEventListener("change", filterTable);

function filterTable() {
    let nameFilter = nameInput.value.toLowerCase();
    let courseFilter = courseInput.value.toLowerCase();

    let rows = document.querySelectorAll("#visitorTable tbody tr");

    rows.forEach(row => {
        let name = row.cells[1].innerText.toLowerCase();
        let course = row.cells[3].innerText.toLowerCase();

        let matchName = name.includes(nameFilter);
        let matchCourse = courseFilter === "" || course.includes(courseFilter);

        row.style.display = (matchName && matchCourse) ? "" : "none";
    });
}

function resetFilters() {
    nameInput.value = "";
    courseInput.value = "";
    filterTable();
}
</script>

</body>
</html>
